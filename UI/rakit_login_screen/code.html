<body class="bg-surface-container-lowest h-full relative overflow-hidden flex items-center justify-center font-body-md text-on-background">
<!-- Background Glow Element -->
<div class="absolute inset-0 z-0 flex items-center justify-center pointer-events-none">
<div class="w-[800px] h-[800px] bg-glow rounded-full filter blur-[100px]"></div>
</div>
<!-- Main Content Canvas -->
<div class="relative z-10 w-full max-w-md px-margin-page mx-auto">
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant/30 card-shadow p-card-padding">
<!-- Logo area -->
<div class="flex items-center justify-center mb-stack-lg">
<span class="font-headline-lg text-headline-lg font-bold text-on-surface">Rakit<span class="text-secondary-fixed-dim">.</span></span>
</div>
<!-- Headline -->
<div class="text-center mb-stack-lg">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-stack-sm">Welcome back</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Please enter your details to sign in.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-stack-md" method="POST">
<!-- Email Input -->
<div>
<label class="sr-only" for="email">Email address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input autocomplete="email" class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg bg-surface-container-low text-on-surface placeholder-outline focus:outline-none focus:ring-1 focus:ring-secondary-fixed-dim focus:border-secondary-fixed-dim transition-colors font-body-sm text-body-sm" id="email" name="email" placeholder="Email address" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<label class="sr-only" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input autocomplete="current-password" class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg bg-surface-container-low text-on-surface placeholder-outline focus:outline-none focus:ring-1 focus:ring-secondary-fixed-dim focus:border-secondary-fixed-dim transition-colors font-body-sm text-body-sm" id="password" name="password" placeholder="Password" required="" type="password"/>
</div>
</div>
<!-- Utilities row -->
<div class="flex items-center justify-between font-body-sm text-body-sm pt-stack-sm pb-stack-md">
<div class="flex items-center">
<input class="h-4 w-4 text-secondary-fixed-dim focus:ring-secondary-fixed-dim border-outline-variant rounded cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-on-surface-variant cursor-pointer" for="remember-me">
                            Remember me
                        </label>
</div>
<div class="text-sm">
<a class="font-medium text-primary-container hover:text-secondary transition-colors" href="#">
                            Forgot password?
                        </a>
</div>
</div>
<!-- Primary Action -->
<div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-full shadow-sm font-label-caps text-label-caps font-bold text-on-primary bg-secondary-fixed-dim hover:bg-secondary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-secondary-fixed-dim transition-colors" type="submit">
                        Log in
                    </button>
</div>
</form>
<div class="mt-stack-lg">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-surface-container-lowest text-on-surface-variant font-body-sm text-body-sm">Or</span>
</div>
</div>
<!-- Secondary Action -->
<div class="mt-stack-lg">
<button class="w-full flex items-center justify-center py-3 px-4 border border-outline-variant rounded-full bg-surface-container-lowest hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-outline-variant transition-colors group" type="button">
<!-- Simplified representation of Google icon for minimal design, avoiding external SVG if possible, using a material symbol as a placeholder for structure -->
<span class="material-symbols-outlined mr-2 text-on-surface-variant group-hover:text-on-surface transition-colors" data-weight="fill">login</span>
<span class="font-label-caps text-label-caps text-on-surface-variant group-hover:text-on-surface transition-colors">Continue with Google</span>
</button>
</div>
</div>
<!-- Footer Link -->
<div class="mt-stack-lg text-center font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="font-semibold text-primary-container hover:text-secondary transition-colors ml-1" href="#">
                    Sign up
                </a>
</div>
</div>
