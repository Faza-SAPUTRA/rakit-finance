<header class="topbar">
  <div>
    <h1>{{ page_title }}</h1>
    {% if subtitle %}<p>{{ subtitle }}</p>{% endif %}
  </div>
  <div class="topbar-actions">
    {% if search %}
      <label class="search-box"><i data-lucide="search"></i><input placeholder="{{ search }}"></label>
    {% endif %}
    {% if export %}
      <button class="btn btn-primary btn-small"><i data-lucide="download"></i> Export</button>
    {% endif %}
    {% if add %}
      <button class="btn btn-primary btn-small" data-open-modal="transaction-modal"><i data-lucide="plus"></i> Quick Add Transaction</button>
    {% endif %}
    <button class="icon-btn"><i data-lucide="bell"></i></button>
    <span class="avatar"></span>
  </div>
</header>
