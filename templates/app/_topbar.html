<header class="topbar">
  <div>
    <h1>{{ page_title }}</h1>
    {% if subtitle %}<p>{{ subtitle }}</p>{% endif %}
  </div>
  <div class="topbar-actions">
    {% if search %}
      <form class="search-box" method="get" action="{{ search_action or request.path }}"><i data-lucide="search"></i><input name="q" value="{{ query or '' }}" placeholder="{{ search }}"></form>
    {% endif %}
    {% if export %}
      <a class="btn btn-primary btn-small" href="{{ export_url }}"><i data-lucide="download"></i> Export</a>
    {% endif %}
    {% if add %}
      <button class="btn btn-primary btn-small" data-open-modal="transaction-modal"><i data-lucide="plus"></i> Quick Add Transaction</button>
    {% endif %}
    <button class="icon-btn" type="button" data-toast="No new notifications."><i data-lucide="bell"></i></button>
    <span class="avatar"></span>
  </div>
</header>
