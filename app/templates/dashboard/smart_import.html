{% extends "dashboard/base.html" %}
{% block page_title %}Smart Import{% endblock %}
{% block dashboard_content %}
<section class="grid gap-6 lg:grid-cols-[.8fr_1.2fr]">
  <form id="import-form" class="rounded-[28px] border border-line bg-white p-8 shadow-card">
    <h2 class="text-xl font-extrabold">Import bank data</h2>
    <p class="mt-2 text-sm text-muted">BCA and GoPay are parsed through different subclasses with one shared interface.</p>
    <label class="mt-6 block text-sm font-bold">Source
      <select name="source" class="mt-2 w-full rounded-2xl border-line">
        <option value="bca">BCA</option>
        <option value="gopay">GoPay</option>
      </select>
    </label>
    <label id="drop-zone" class="mt-5 grid min-h-56 cursor-pointer place-items-center rounded-[24px] border-2 border-dashed border-line bg-offwhite p-6 text-center">
      <input class="hidden" name="file" type="file" accept=".csv,.xls,.xlsx" required>
      <span><span class="material-symbols-outlined text-5xl text-primary">upload_file</span><span class="mt-3 block font-extrabold">Drop CSV/Excel here</span><span class="mt-1 block text-sm text-muted">or click to browse</span></span>
    </label>
    <button class="mt-6 w-full rounded-full bg-primary py-4 font-extrabold text-white">Preview import</button>
  </form>
  <div class="rounded-[28px] border border-line bg-white p-8 shadow-card">
    <div class="flex items-center justify-between"><h2 class="text-xl font-extrabold">Preview</h2><button id="confirm-import" class="rounded-full bg-accent px-4 py-2 text-sm font-extrabold text-black" disabled>Confirm</button></div>
    <div id="import-preview" class="mt-6 rounded-[24px] bg-offwhite p-5 text-sm text-muted">Parsed transactions will appear here before saving.</div>
  </div>
</section>
{% endblock %}
