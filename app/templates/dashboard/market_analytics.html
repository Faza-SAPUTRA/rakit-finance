{% extends "dashboard/base.html" %}
{% block page_title %}Market Analytics{% endblock %}
{% block dashboard_content %}
<section class="grid gap-6 lg:grid-cols-2">
  <div class="rounded-[28px] border border-line bg-white p-8 shadow-card">
    <h2 class="text-xl font-extrabold">Portfolio distribution</h2>
    <canvas id="portfolioChart" class="mt-8"></canvas>
  </div>
  <div class="rounded-[28px] border border-line bg-white p-8 shadow-card">
    <h2 class="text-xl font-extrabold">Risk exposure index</h2>
    <div class="mt-8 grid place-items-center">
      <canvas id="riskGauge" class="max-w-sm"></canvas>
      <p id="risk-score" class="-mt-24 text-5xl font-extrabold tabular-nums">0</p>
    </div>
  </div>
</section>
<section class="mt-6 rounded-[28px] border border-line bg-white p-8 shadow-card">
  <h2 class="text-xl font-extrabold">Market feed</h2>
  <div class="mt-6 grid gap-4 md:grid-cols-2">
    {% for item in news %}
    <article class="rounded-[24px] bg-offwhite p-5"><span class="rounded-full bg-accent/10 px-3 py-1 text-xs font-extrabold text-primary">{{ item.tag }}</span><h3 class="mt-4 font-extrabold">{{ item.title }}</h3></article>
    {% endfor %}
  </div>
</section>
{% endblock %}
