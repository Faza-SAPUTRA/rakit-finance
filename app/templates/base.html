<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0F5C3F">
    <title>{% block title %}Rakit{% endblock %}</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              white: "#FFFFFF",
              offwhite: "#F7F8F7",
              primary: "#0F5C3F",
              accent: "#2ECC71",
              black: "#0A0A0A",
              charcoal: "#1A1A1A",
              muted: "#8A9A92",
              line: "#DDE6E0"
            },
            fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui"] },
            boxShadow: {
              glow: "0 24px 80px rgba(15,92,63,.16)",
              card: "0 20px 60px rgba(10,10,10,.06)"
            }
          }
        }
      }
    </script>
    {% set static_version = "20260628-menu-fix-v1" %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css', v=static_version) }}">
    {% block head %}{% endblock %}
  </head>
  <body class="bg-white text-black antialiased">
    {% block body %}{% endblock %}
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='js/react-bits-effects.js', v=static_version) }}"></script>
    <script src="{{ url_for('static', filename='js/anime-animations.js', v=static_version) }}"></script>
    <script src="{{ url_for('static', filename='js/gsap-animations.js', v=static_version) }}"></script>
    <script src="{{ url_for('static', filename='js/staggered-menu.js', v=static_version) }}"></script>
    <script src="{{ url_for('static', filename='js/scroll-stack.js', v=static_version) }}"></script>
    <script src="{{ url_for('static', filename='js/charts.js', v=static_version) }}"></script>
    <script src="{{ url_for('static', filename='js/app.js', v=static_version) }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
