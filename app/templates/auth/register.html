{% extends "base.html" %}
{% block title %}Register - Rakit{% endblock %}
{% block body %}
<main class="auth-surface grid min-h-screen place-items-center overflow-hidden bg-offwhite px-6 py-12">
  <section class="w-full max-w-md rounded-[28px] border border-line bg-white/90 p-8 shadow-glow backdrop-blur">
    <a href="/" class="mb-8 flex items-center gap-3 text-xl font-extrabold"><span class="grid size-10 place-items-center rounded-2xl bg-primary text-white">R</span> Rakit</a>
    <h1 class="text-3xl font-extrabold">Create your dashboard</h1>
    {% include "partials/flashes.html" ignore missing %}
    <form class="mt-8 space-y-5" method="post">
      <label class="block text-sm font-bold">Name<input class="mt-2 w-full rounded-2xl border-line" name="name" required></label>
      <label class="block text-sm font-bold">Email<input class="mt-2 w-full rounded-2xl border-line" name="email" type="email" required></label>
      <label class="block text-sm font-bold">Password<input class="mt-2 w-full rounded-2xl border-line" name="password" type="password" required></label>
      <button class="magnetic-btn w-full rounded-full bg-primary py-4 font-extrabold text-white shadow-glow">Create account</button>
    </form>
    <p class="mt-6 text-center text-sm text-muted">Already have an account? <a class="font-bold text-primary" href="{{ url_for('auth.login') }}">Log in</a></p>
  </section>
</main>
{% endblock %}
